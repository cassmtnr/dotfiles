# Codex CLI configuration
# Symlinked to ~/.codex/config.toml

model = "gpt-5.4"
model_instructions_file = "~/.codex/instructions.md"

# "untrusted" = ask before everything (most restrictive)
# "on-failure" = auto-approve until a command fails
# "on-request" = auto-approve file edits, ask for commands
# "granular" = per-tool approval settings
# "never" = auto-approve everything (least restrictive)
approval_policy = "on-request"
model_reasoning_effort = "xhigh"

[features]
codex_hooks = true

[tui]
# Keep the full status line versioned here so it survives Codex restarts/new sessions.
status_line = ["model-with-reasoning", "context-remaining", "current-dir", "model-name", "project-root", "git-branch", "context-used", "five-hour-limit", "weekly-limit", "context-window-size", "session-id"]
terminal_title = ["spinner", "project"]

[projects."~/"]
trust_level = "trusted"
